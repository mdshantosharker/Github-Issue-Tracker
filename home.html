<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github-Home</title>
    <!-- Tailwind + daisyui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!--Geist fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <style>
    * {
      font-family: "Geist", sans-serif;
    }
  </style>
  <body>
    <header class="shadow-sm">
      <div class="w-10/12 mx-auto mt-5 pb-5 lg:flex justify-between">
        <div class="flex items-center justify-center gap-2">
          <div>
            <img class="w-8" src="/assets/github-logo.png" alt="" />
          </div>
          <h1 class="font-semibold text-2xl">GitHub Issues Tracker</h1>
        </div>

        <div class="flex gap-2 items-center mt-5 lg:mt-0 md:justify-center">
          <label class="input">
            <svg
              class="h-[1em] opacity-50"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
            >
              <g
                stroke-linejoin="round"
                stroke-linecap="round"
                stroke-width="2.5"
                fill="none"
                stroke="currentColor"
              >
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
              </g>
            </svg>
            <input type="search" required placeholder="Search" />
          </label>

          <button class="btn btn-primary font-semibold text-[16px]">
            + New Issue
          </button>
        </div>
      </div>
    </header>
  </body>
</html>
